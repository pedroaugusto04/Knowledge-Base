<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" width="100%" height="100%">
  <defs>
    <!-- Card Drop Shadows -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="125%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>

    <!-- Fills -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="source-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <linearGradient id="api-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>

    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>

    <linearGradient id="ui-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>

    <!-- Line Gradients -->
    <linearGradient id="cyan-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.8"/>
    </linearGradient>

    <linearGradient id="green-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="purple-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="390" rx="16" fill="url(#bg-grad)" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Grid Pattern (Subtle background texture) -->
  <g opacity="0.15">
    <path d="M 0,30 L 800,30 M 0,60 L 800,60 M 0,90 L 800,90 M 0,120 L 800,120 M 0,150 L 800,150 M 0,180 L 800,180 M 0,210 L 800,210 M 0,240 L 800,240 M 0,270 L 800,270 M 0,300 L 800,300 M 0,330 L 800,330 M 0,360 L 800,360" stroke="#94a3b8" stroke-width="0.5"/>
    <path d="M 50,0 L 50,390 M 100,0 L 100,390 M 150,0 L 150,390 M 200,0 L 200,390 M 250,0 L 250,390 M 300,0 L 300,390 M 350,0 L 350,390 M 400,0 L 400,390 M 450,0 L 450,390 M 500,0 L 500,390 M 550,0 L 550,390 M 600,0 L 600,390 M 650,0 L 650,390 M 700,0 L 700,390 M 750,0 L 750,390" stroke="#94a3b8" stroke-width="0.5"/>
  </g>

  <!-- Connection Lines (Inputs -> API) -->
  <g fill="none" stroke-width="1.5">
    <path d="M 270,60 C 320,60 310,195 360,195" stroke="url(#cyan-fade)" stroke-dasharray="4 4"/>
    <path d="M 270,150 C 320,150 310,195 360,195" stroke="url(#cyan-fade)" stroke-dasharray="4 4"/>
    <path d="M 270,240 C 320,240 310,195 360,195" stroke="url(#cyan-fade)" stroke-dasharray="4 4"/>
    <path d="M 270,330 C 320,330 310,195 360,195" stroke="url(#cyan-fade)" stroke-dasharray="4 4"/>
  </g>

  <!-- Connection Lines (API -> Database & UI) -->
  <g fill="none" stroke-width="2">
    <path d="M 500,195 C 540,195 550,110 590,110" stroke="url(#green-fade)"/>
    <path d="M 500,195 C 540,195 550,270 590,270" stroke="url(#purple-fade)"/>
  </g>

  <!-- Connection Line (Database -> UI) -->
  <path d="M 675,150 L 675,230" fill="none" stroke="#7e22ce" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Left Column: Input Sources -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Card 1: VS Code -->
    <rect x="40" y="30" width="230" height="60" rx="8" fill="url(#source-grad)" stroke="#cbd5e1" stroke-width="1" filter="url(#card-shadow)"/>
    <text x="56" y="52" font-size="14" font-weight="bold" fill="#0f172a">VS Code Extension</text>
    <text x="56" y="70" font-size="11" fill="#64748b">AI Chats &amp; Snippets</text>

    <!-- Card 2: Git Push -->
    <rect x="40" y="120" width="230" height="60" rx="8" fill="url(#source-grad)" stroke="#cbd5e1" stroke-width="1" filter="url(#card-shadow)"/>
    <text x="56" y="142" font-size="14" font-weight="bold" fill="#0f172a">GitHub Integration</text>
    <text x="56" y="160" font-size="11" fill="#64748b">Commit Diffs &amp; Activity</text>

    <!-- Card 3: CLI -->
    <rect x="40" y="210" width="230" height="60" rx="8" fill="url(#source-grad)" stroke="#cbd5e1" stroke-width="1" filter="url(#card-shadow)"/>
    <text x="56" y="232" font-size="14" font-weight="bold" fill="#0f172a">Terminal CLI</text>
    <text x="56" y="250" font-size="11" fill="#64748b">sync-ai Terminal Logs</text>

    <!-- Card 4: WhatsApp -->
    <rect x="40" y="300" width="230" height="60" rx="8" fill="url(#source-grad)" stroke="#cbd5e1" stroke-width="1" filter="url(#card-shadow)"/>
    <text x="56" y="322" font-size="14" font-weight="bold" fill="#0f172a">Messaging Apps</text>
    <text x="56" y="340" font-size="11" fill="#64748b">WhatsApp &amp; Telegram</text>
  </g>

  <!-- Middle Column: API Ingestion Hub -->
  <g font-family="system-ui, -apple-system, sans-serif" filter="url(#card-shadow)">
    <rect x="360" y="135" width="140" height="120" rx="12" fill="url(#api-grad)" stroke="#0369a1" stroke-width="2"/>
    <!-- API Symbol / Icon (Subtle) -->
    <circle cx="430" cy="175" r="16" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
    <path d="M 423,175 L 437,175 M 430,168 L 430,182" stroke="#0369a1" stroke-width="2" stroke-linecap="round"/>
    <text x="430" y="215" font-size="15" font-weight="bold" fill="#0369a1" text-anchor="middle">Kote API</text>
    <text x="430" y="232" font-size="10.5" fill="#475569" text-anchor="middle">Ingestion Hub</text>
  </g>

  <!-- Right Column: Database and User Interface -->
  <g font-family="system-ui, -apple-system, sans-serif" filter="url(#card-shadow)">
    <!-- Card 5: Cloud Database -->
    <rect x="590" y="70" width="170" height="80" rx="10" fill="url(#db-grad)" stroke="#15803d" stroke-width="1.5"/>
    <text x="675" y="102" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">Cloud Database</text>
    <text x="675" y="122" font-size="11" fill="#475569" text-anchor="middle">Vector Storage</text>
    <text x="675" y="137" font-size="10" fill="#64748b" text-anchor="middle">Semantic Knowledge</text>

    <!-- Card 6: User Interface -->
    <rect x="590" y="230" width="170" height="80" rx="10" fill="url(#ui-grad)" stroke="#7e22ce" stroke-width="1.5"/>
    <text x="675" y="262" font-size="14" font-weight="bold" fill="#7e22ce" text-anchor="middle">User Interface</text>
    <text x="675" y="282" font-size="11" fill="#475569" text-anchor="middle">Search &amp; Map View</text>
    <text x="675" y="297" font-size="10" fill="#64748b" text-anchor="middle">Web / IDE / Mobile</text>
  </g>
</svg>
