<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Connection Lines (Inputs -> API) -->
  <g fill="none" stroke="#475569" stroke-width="1.2">
    <path d="M 240,45 C 295,45 295,125 350,125" marker-end="url(#arrow-gray)"/>
    <path d="M 240,125 L 350,125" marker-end="url(#arrow-gray)"/>
    <path d="M 240,205 C 295,205 295,125 350,125" marker-end="url(#arrow-gray)"/>
  </g>

  <!-- Connection Lines (API -> Database & UI) -->
  <g fill="none" stroke="#38bdf8" stroke-width="1.5">
    <path d="M 470,125 C 525,125 525,77.5 580,77.5" marker-end="url(#arrow-cyan)"/>
    <path d="M 470,125 C 525,125 525,177.5 580,177.5" marker-end="url(#arrow-cyan)"/>
  </g>

  <!-- Connection Line (Database -> UI) -->
  <path d="M 670,105 L 670,144" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow-gray)"/>

  <!-- Left Column: Input Sources -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Card 1: VS Code & CLI -->
    <rect x="40" y="20" width="200" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="56" y="39" font-size="13" font-weight="600" fill="#f8fafc">VS Code &amp; CLI</text>
    <text x="56" y="54" font-size="10.5" fill="#94a3b8">IDE chats and terminal logs</text>

    <!-- Card 2: Git Push -->
    <rect x="40" y="100" width="200" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="56" y="119" font-size="13" font-weight="600" fill="#f8fafc">GitHub Integration</text>
    <text x="56" y="134" font-size="10.5" fill="#94a3b8">Commit diffs on push</text>

    <!-- Card 3: Messaging -->
    <rect x="40" y="180" width="200" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="56" y="199" font-size="13" font-weight="600" fill="#f8fafc">WhatsApp &amp; Telegram</text>
    <text x="56" y="214" font-size="10.5" fill="#94a3b8">Quick audio and text notes</text>
  </g>

  <!-- Middle Column: API Ingestion Hub -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="350" y="90" width="120" height="70" rx="8" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="410" y="124" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">Kote API</text>
    <text x="410" y="141" font-size="11" fill="#94a3b8" text-anchor="middle">Ingestion Hub</text>
  </g>

  <!-- Right Column: Database and User Interface -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Card 4: Cloud Database -->
    <rect x="580" y="50" width="180" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="670" y="74" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">Cloud Database</text>
    <text x="670" y="90" font-size="10.5" fill="#94a3b8" text-anchor="middle">Semantic vector storage</text>

    <!-- Card 5: User Interface -->
    <rect x="580" y="150" width="180" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="670" y="174" font-size="13" font-weight="600" fill="#f8fafc" text-anchor="middle">User Interface</text>
    <text x="670" y="190" font-size="10.5" fill="#94a3b8" text-anchor="middle">Web search &amp; map view</text>
  </g>
</svg>
